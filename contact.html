<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <link rel="stylesheet" href="css/contact.css">
</head>
<body>

    <!-- CONTACT SECTION -->
    <section class="contact">
        
        <!-- HEADER -->
        <div class="contact-header">
            <h2>Want to Contact me?</h2>
            <h3>Fill out the form below.</h3>
        </div>

        <!-- FORM -->
        <div class="form-container">
            <form>

  <fieldset>
    <legend>Personal Information</legend>

    <label for="name">Name:</label>
    <input type="text" id="name" name="name" required><br><br>

    <label for="email">Email:</label>
    <input type="email" id="email" name="email" required><br><br>

    <label for="phone">Phone:</label>
    <input type="tel" id="phone" name="phone"><br><br>

    <label for="country">Country:</label>
    <select id="country" name="country" required>
      <option value="" disabled selected>Select a country</option>
      <option value="usa">United States</option>
      <option value="nepal">Nepal</option>
      <option value="india">India</option>
      <option value="uk">United Kingdom</option>
    </select><br><br>

    <label for="age">Age:</label>
    <input type="number" id="age" name="age" min="18" max="25"><br><br>

  </fieldset>

  <fieldset>
    <legend>Additional Information</legend>

    <label>Gender:</label>
    <input type="radio" id="male" name="gender" value="male">
    <label for="male">Male</label>

    <input type="radio" id="female" name="gender" value="female">
    <label for="female">Female</label><br><br>

    <label>Skills:</label><br>
    <input type="checkbox" id="skill1" name="skills[]" value="programming">
    <label for="skill1">Programming</label><br>

    <input type="checkbox" id="skill2" name="skills[]" value="design">
    <label for="skill2">Design</label><br>

    <input type="checkbox" id="skill3" name="skills[]" value="marketing">
    <label for="skill3">Marketing</label><br><br>

    <label for="message">Message:</label><br>
    <textarea id="message" name="message"></textarea><br><br>

  </fieldset>

  <button type="submit">Submit</button>

</form>
        </div>

    </section>

    <!-- SOCIAL SECTION -->
    <section class="social">
        <h2>Visit my social medias:</h2>

        <ul>
            <li><a href="https://www.example.com" target="_blank">LinkedIn</a></li>
            <li><a href="https://www.example.com" target="_blank">Twitter</a></li>
            <li><a href="https://www.example.com" target="_blank">GitHub</a></li>
        </ul>

    </section>
    
    <a href="index.html" class="btn">Back to Home</a>
</body>
</html>`
