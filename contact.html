<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <link rel="stylesheet" href="css/contact.css">
</head>
<body>
    <main>
        <!-- Contact form section -->
        <section class="contact" id="contact-section">
            <div class="contact-header">
                <h2>Want to contact me?</h2>
                <h3>Fill out the form below.</h3>
            </div>

            <div class="form-container">
                <form id="contact-form" novalidate>
                    <fieldset>
                        <legend>Personal Information</legend>

                        <label for="name">Name:</label>
                        <input type="text" id="name" name="name" required>

                        <label for="email">Email:</label>
                        <input type="email" id="email" name="email" required>

                        <label for="phone">Phone:</label>
                        <input type="tel" id="phone" name="phone">

                        <label for="country">Country:</label>
                        <select id="country" name="country" required>
                            <option value="" disabled selected>Select a country</option>
                            <option value="usa">United States</option>
                            <option value="nepal">Nepal</option>
                            <option value="india">India</option>
                            <option value="uk">United Kingdom</option>
                        </select>

                        <label for="age">Age:</label>
                        <input type="number" id="age" name="age" min="18" max="25">
                    </fieldset>

                    <fieldset>
                        <legend>Additional Information</legend>

                        <p class="group-label">Gender:</p>
                        <label class="choice"><input type="radio" id="male" name="gender" value="male">Male</label>
                        <label class="choice"><input type="radio" id="female" name="gender" value="female">Female</label>

                        <p class="group-label">Skills:</p>
                        <label class="choice"><input type="checkbox" id="skill1" name="skills[]" value="programming">Programming</label>
                        <label class="choice"><input type="checkbox" id="skill2" name="skills[]" value="design">Design</label>
                        <label class="choice"><input type="checkbox" id="skill3" name="skills[]" value="marketing">Marketing</label>

                        <label for="message">Message:</label>
                        <textarea id="message" name="message"></textarea>
                    </fieldset>

                    <p id="form-feedback" class="form-feedback" aria-live="polite"></p>
                    <button type="submit">Submit</button>
                </form>
            </div>
        </section>

        <!-- Direct contact links -->
        <section class="social">
            <h2>Contact Links</h2>
            <ul>
                <li><a href="mailto:your.email@example.com">Email</a></li>
                <li><a href="https://www.linkedin.com/" target="_blank" rel="noopener noreferrer">LinkedIn</a></li>
                <li><a href="https://github.com/nitishb7" target="_blank" rel="noopener noreferrer">GitHub</a></li>
            </ul>
        </section>
    </main>

    <!-- Back to home link -->
    <a href="index.html" class="btn">Back to Home</a>
    <!-- Shared JavaScript interactions -->
    <script src="js/script.js"></script>
</body>
</html>
